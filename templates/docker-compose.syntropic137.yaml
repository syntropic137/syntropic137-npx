# =============================================================================
# Syntropic137 — Self-Host Docker Compose (Published)
# =============================================================================
#
# This is a SELF-CONTAINED compose file for self-hosters who pull pre-built
# images from GHCR. No source code or submodules required.
#
# Setup:
#   1. Copy this file to ~/.syntropic137/
#   2. Copy selfhost-entrypoint.sh to ~/.syntropic137/
#   3. Copy .env.example to ~/.syntropic137/.env and configure
#   4. Create secrets: mkdir -p secrets/ && openssl rand -hex 32 > secrets/db-password.secret
#   5. docker compose -f docker-compose.syntropic137.yaml up -d
#
# See: https://docs.syntropic137.dev/self-host
# =============================================================================

name: syntropic137_selfhost

services:
  # ===========================================================================
  # DATABASE — TimescaleDB (ADR-030: unified database)
  # ===========================================================================
  timescaledb:
    image: timescale/timescaledb:2.25.1-pg16
    container_name: syn137-timescaledb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syn}
      POSTGRES_USER: ${POSTGRES_USER:-syn}
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syn} -d ${POSTGRES_DB:-syn}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    tmpfs:
      - /tmp
      - /run
      - /var/run/postgresql
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1g}
          cpus: "${POSTGRES_CPU_LIMIT:-1.0}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - syn-internal

  # ===========================================================================
  # EVENT STORE — gRPC Event Sourcing Server
  # ===========================================================================
  event-store:
    image: ghcr.io/syntropic137/event-store:${SYN_VERSION:-latest}
    container_name: syn137-event-store
    environment:
      BACKEND: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      BIND_ADDR: 0.0.0.0:50051
      RUST_LOG: info
    volumes:
      - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/selfhost-entrypoint.sh"]
    command: ["/usr/local/bin/eventstore"]
    secrets:
      - db_password
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${EVENT_STORE_MEMORY_LIMIT:-512m}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # COLLECTOR — Agent Event Ingestion Service
  # ===========================================================================
  collector:
    image: ghcr.io/syntropic137/syn-collector:${SYN_VERSION:-latest}
    container_name: syn137-collector
    volumes:
      - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/selfhost-entrypoint.sh"]
    command: ["python", "-m", "syn_collector.cli", "serve", "--port", "8080", "--host", "0.0.0.0"]
    environment:
      EVENT_COLLECTOR_PORT: "8080"
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_BATCH_SIZE: "100"
      EVENT_BATCH_INTERVAL_MS: "1000"
    secrets:
      - db_password
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import http.client; c=http.client.HTTPConnection(''localhost'',8080); c.request(''GET'',''/health''); exit(0 if c.getresponse().status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${COLLECTOR_MEMORY_LIMIT:-256m}
          cpus: "${COLLECTOR_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # DOCKER SOCKET PROXY (ISS-164)
  # ===========================================================================
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: syn137-docker-socket-proxy
    environment:
      CONTAINERS: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      EXEC: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - syn-proxy

  # ===========================================================================
  # API — Query and Control Service
  # ===========================================================================
  api:
    image: ghcr.io/syntropic137/syn-api:${SYN_VERSION:-latest}
    container_name: syn137-api
    volumes:
      - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
      - api_logs:/app/logs
      - ./workspaces:/workspaces
    entrypoint: ["/bin/sh", "/selfhost-entrypoint.sh"]
    command: ["sh", "-c", "uvicorn syn_api.main:app --host $$SYN_API_HOST --port $$SYN_API_PORT --root-path /api/v1"]
    environment:
      SYN_API_PORT: "8000"
      SYN_API_HOST: "0.0.0.0"
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_STORE_HOST: event-store
      EVENT_STORE_PORT: "50051"
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-selfhost}
      # GitHub App (optional — private key mounted as Docker secret)
      SYN_GITHUB_APP_ID: ${SYN_GITHUB_APP_ID:-}
      SYN_GITHUB_APP_NAME: ${SYN_GITHUB_APP_NAME:-}
      SYN_GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github_app_private_key
      SYN_GITHUB_WEBHOOK_SECRET: ${SYN_GITHUB_WEBHOOK_SECRET:-}
      # 1Password (optional)
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
      # MinIO (artifact storage) — password read from Docker secret in entrypoint
      SYN_STORAGE_PROVIDER: minio
      SYN_STORAGE_MINIO_ENDPOINT: minio:9000
      SYN_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SYN_STORAGE_MINIO_SECURE: "false"
      # Agent credentials (for workspace containers)
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Workspace configuration
      SYN_WORKSPACE_CONTAINER_DIR: /workspaces
      SYN_WORKSPACE_HOST_DIR: ${PWD}/workspaces
      # Docker socket proxy (ISS-164)
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      SYN_AGENT_NETWORK: syntropic137_selfhost_agent-net
    depends_on:
      timescaledb:
        condition: service_healthy
      event-store:
        condition: service_healthy
      collector:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    secrets:
      - db_password
      - redis_password
      - minio_password
      - github_app_private_key
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import http.client; c=http.client.HTTPConnection(''localhost'',8000); c.request(''GET'',''/health''); exit(0 if c.getresponse().status==200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /home/syn/.config
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512m}
          cpus: "${API_CPU_LIMIT:-0.5}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal
      - syn-proxy

  # ===========================================================================
  # GATEWAY — nginx reverse proxy + dashboard UI
  # ===========================================================================
  gateway:
    image: ghcr.io/syntropic137/syn-gateway:${SYN_VERSION:-latest}
    container_name: syn137-gateway
    ports:
      - "127.0.0.1:${SYN_GATEWAY_PORT:-8137}:80"
    environment:
      SYN_API_PASSWORD: ${SYN_API_PASSWORD:-}
      SYN_API_USER: ${SYN_API_USER:-admin}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    deploy:
      resources:
        limits:
          memory: ${UI_MEMORY_LIMIT:-256m}
          cpus: "${UI_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # CLOUDFLARE TUNNEL (optional — profile: tunnel)
  # ===========================================================================
  # Only starts when COMPOSE_PROFILES=tunnel is set in .env (or --profile tunnel).
  # Provides secure external access without port forwarding.
  #
  # Setup:
  #   1. Create tunnel in Cloudflare Zero Trust dashboard
  #   2. Set CLOUDFLARE_TUNNEL_TOKEN in .env
  #   3. Set public hostname service URL to: http://gateway:80
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: syn137-cloudflared
    profiles: [tunnel]
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      gateway:
        condition: service_healthy
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # MINIO — S3-compatible Object Storage
  # ===========================================================================
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: syn137-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ""
    entrypoint: ["sh", "-c", "export MINIO_ROOT_PASSWORD=\"$(cat /run/secrets/minio_password)\" && exec minio server /data --console-address ':9001'"]
    command: []
    secrets:
      - minio_password
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEMORY_LIMIT:-256m}
          cpus: "${MINIO_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # REDIS — Caching and Pub/Sub
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: syn137-redis
    user: "999:999"
    entrypoint: ["sh", "-c", "exec redis-server --dir /data --appendonly yes --requirepass \"$(cat /run/secrets/redis_password)\""]
    command: []
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-256m}
          cpus: "${REDIS_CPU_LIMIT:-0.25}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - syn-internal

  # ===========================================================================
  # ENVOY PROXY — Shared Credential Injection Proxy (ISS-43)
  # ===========================================================================
  envoy-proxy:
    image: ghcr.io/syntropic137/sidecar-proxy:${SYN_VERSION:-latest}
    container_name: syn137-envoy-proxy
    depends_on:
      token-injector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
      - syn-internal
      - agent-net

  # ===========================================================================
  # TOKEN INJECTOR — ext_authz HTTP service (ISS-43)
  # ===========================================================================
  token-injector:
    image: ghcr.io/syntropic137/token-injector:${SYN_VERSION:-latest}
    container_name: syn137-token-injector
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    restart: always
    networks:
      - syn-internal

# =============================================================================
# SECRETS (file-based — relative to ~/.syntropic137/)
# =============================================================================
secrets:
  db_password:
    file: ./secrets/db-password.secret
  redis_password:
    file: ./secrets/redis-password.secret
  minio_password:
    file: ./secrets/minio-password.secret
  github_app_private_key:
    file: ./secrets/github-app-private-key.pem

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  db_data:
    name: syn137_db_data
  api_logs:
    name: syn137_api_logs
  minio_data:
    name: syn137_minio_data
  redis_data:
    name: syn137_redis_data

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  syn-internal:
    name: syn137_internal
    driver: bridge
  syn-proxy:
    name: syn137_proxy
    driver: bridge
    internal: true
  agent-net:
    # Agents need egress for git clone/push. API key security enforced via
    # ANTHROPIC_BASE_URL routing to the proxy — agents hold a placeholder only.
