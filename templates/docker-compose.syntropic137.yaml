name: syntropic137_selfhost
services:
  timescaledb:
    image: timescale/timescaledb:2.25.1-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syn}
      POSTGRES_USER: ${POSTGRES_USER:-syn}
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-syn} -d ${POSTGRES_DB:-syn}
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: syn137-timescaledb
    secrets:
    - db_password
    volumes:
    - db_data:/var/lib/postgresql/data
    - ./init-db:/docker-entrypoint-initdb.d:ro
    restart: always
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETUID
    - SETGID
    - FOWNER
    - DAC_OVERRIDE
    tmpfs:
    - /tmp
    - /run
    - /var/run/postgresql
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1g}
          cpus: ${POSTGRES_CPU_LIMIT:-1.0}
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
    - syn-internal
  event-store:
    environment:
      BACKEND: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      BIND_ADDR: 0.0.0.0:50051
      RUST_LOG: info
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - bash -c '</dev/tcp/localhost/50051' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    container_name: syn137-event-store
    volumes:
    - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
    entrypoint:
    - /bin/sh
    - /selfhost-entrypoint.sh
    command:
    - /usr/local/bin/eventstore
    secrets:
    - db_password
    restart: always
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp
    deploy:
      resources:
        limits:
          memory: ${EVENT_STORE_MEMORY_LIMIT:-512m}
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "3"
    networks:
    - syn-internal
    image: ghcr.io/syntropic137/event-store@sha256:375ec0fa28ad8ab805ac0c47176197af57a7d91612205f05fe5e640d03c74f47
  collector:
    networks:
    - syn-internal
    - agent-net
    environment:
      EVENT_COLLECTOR_PORT: "8080"
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_BATCH_SIZE: "100"
      EVENT_BATCH_INTERVAL_MS: "1000"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import http.client; c=http.client.HTTPConnection('localhost',8080); c.request('GET','/health'); exit(0
        if c.getresponse().status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    container_name: syn137-collector
    volumes:
    - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
    entrypoint:
    - /bin/sh
    - /selfhost-entrypoint.sh
    command:
    - python
    - -m
    - syn_collector.cli
    - serve
    - --port
    - "8080"
    - --host
    - 0.0.0.0
    secrets:
    - db_password
    restart: always
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp
    deploy:
      resources:
        limits:
          memory: ${COLLECTOR_MEMORY_LIMIT:-256m}
          cpus: ${COLLECTOR_CPU_LIMIT:-0.25}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    image: ghcr.io/syntropic137/syn-collector@sha256:c3ba0dc098802cdc687df434e7616227fcae28f0d6652752180c7227b3397ab9
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: syn137-docker-socket-proxy
    environment:
      CONTAINERS: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      EXEC: 1
      POST: 1
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETUID
    - SETGID
    tmpfs:
    - /tmp
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"
    networks:
    - syn-proxy
  api:
    environment:
      SYN_API_PORT: "8000"
      SYN_API_HOST: 0.0.0.0
      SYN_OBSERVABILITY_DB_URL: postgres://${POSTGRES_USER:-syn}:${POSTGRES_PASSWORD:-syn_dev_password}@timescaledb:5432/${POSTGRES_DB:-syn}
      EVENT_STORE_HOST: event-store
      EVENT_STORE_PORT: "50051"
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SYN_GITHUB_APP_ID: ${SYN_GITHUB_APP_ID:-}
      SYN_GITHUB_APP_NAME: ${SYN_GITHUB_APP_NAME:-}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-selfhost}
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
      SYN_STORAGE_PROVIDER: minio
      SYN_STORAGE_MINIO_ENDPOINT: minio:9000
      SYN_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SYN_STORAGE_MINIO_SECURE: "false"
      SYN_GITHUB_WEBHOOK_SECRET: ${SYN_GITHUB_WEBHOOK_SECRET:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SYN_WORKSPACE_CONTAINER_DIR: /workspaces
      SYN_WORKSPACE_HOST_DIR: ${SYN_INSTALL_DIR:-.}/workspaces
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      SYN_AGENT_NETWORK: syntropic137_selfhost_agent-net
      SYN_PROXY_URL: http://envoy-proxy:8081
      SYN_GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github_app_private_key
    depends_on:
      timescaledb:
        condition: service_healthy
      event-store:
        condition: service_healthy
      collector:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import http.client; c=http.client.HTTPConnection('localhost',8000); c.request('GET','/health'); exit(0
        if c.getresponse().status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    container_name: syn137-api
    volumes:
    - ./selfhost-entrypoint.sh:/selfhost-entrypoint.sh:ro
    - api_logs:/app/logs
    - ./workspaces:/workspaces
    entrypoint:
    - /bin/sh
    - /selfhost-entrypoint.sh
    command:
    - sh
    - -c
    - uvicorn syn_api.main:app --host $$SYN_API_HOST --port $$SYN_API_PORT --root-path /api/v1
    secrets:
    - db_password
    - redis_password
    - minio_password
    - github_app_private_key
    restart: always
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp
    - /home/syn/.config
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512m}
          cpus: ${API_CPU_LIMIT:-0.5}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
    - syn-internal
    - syn-proxy
    image: ghcr.io/syntropic137/syn-api@sha256:a4751f9166a941b0596b24e9d4b6acd837bbec4afa226ac55c4238ca90009a82
  gateway:
    container_name: syn137-gateway
    ports:
    - 127.0.0.1:${SYN_GATEWAY_PORT:-8137}:80
    environment:
      SYN_API_PASSWORD: ${SYN_API_PASSWORD:-}
      SYN_API_USER: ${SYN_API_USER:-admin}
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://127.0.0.1:80/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    restart: always
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETUID
    - SETGID
    tmpfs:
    - /tmp
    - /var/cache/nginx
    - /run
    deploy:
      resources:
        limits:
          memory: ${UI_MEMORY_LIMIT:-256m}
          cpus: ${UI_CPU_LIMIT:-0.25}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
    - syn-internal
    image: ghcr.io/syntropic137/syn-gateway@sha256:fbaaecad2b50e163857fc587c7b1e3b32f7e06beeebcadd98ec71aeeb03998b1
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: syn137-cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: on-failure:3
    depends_on:
      gateway:
        condition: service_healthy
    networks:
    - syn-internal
    profiles:
    - tunnel
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ""
    command: []
    healthcheck:
      test:
      - CMD
      - mc
      - ready
      - local
      interval: 30s
      timeout: 20s
      retries: 3
    container_name: syn137-minio
    entrypoint:
    - sh
    - -c
    - export MINIO_ROOT_PASSWORD="$(cat /run/secrets/minio_password)" && exec minio server /data --console-address ':9001'
    secrets:
    - minio_password
    volumes:
    - minio_data:/data
    restart: always
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEMORY_LIMIT:-256m}
          cpus: ${MINIO_CPU_LIMIT:-0.25}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
    - syn-internal
  redis:
    image: redis:7-alpine
    command: []
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -a "$(cat /run/secrets/redis_password)" ping | grep -q PONG
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: syn137-redis
    user: 999:999
    entrypoint:
    - sh
    - -c
    - exec redis-server --dir /data --appendonly yes --requirepass "$(cat /run/secrets/redis_password)"
    secrets:
    - redis_password
    volumes:
    - redis_data:/data
    restart: always
    read_only: true
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-256m}
          cpus: ${REDIS_CPU_LIMIT:-0.25}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
    - syn-internal
  envoy-proxy:
    networks:
    - syn-internal
    - agent-net
    depends_on:
      token-injector:
        condition: service_started
    healthcheck:
      test:
      - CMD-SHELL
      - bash -c '</dev/tcp/localhost/8081' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    image: ghcr.io/syntropic137/sidecar-proxy@sha256:76d484877d5d0bf9e2787a11f953137ce7ee84aaff5a1d6c0ac17f8f6e022444
    container_name: syn137-envoy-proxy
    restart: always
  token-injector:
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    networks:
    - syn-internal
    image: ghcr.io/syntropic137/token-injector@sha256:a2f46a9a9414ef0d2fb829494a0992e71d73e46aa97ac8c79b191857cb1d1fbb
    container_name: syn137-token-injector
    restart: always
secrets:
  db_password:
    file: ./secrets/db-password.secret
  redis_password:
    file: ./secrets/redis-password.secret
  minio_password:
    file: ./secrets/minio-password.secret
  github_app_private_key:
    file: ./secrets/github-app-private-key.pem
volumes:
  db_data:
    name: syn137_db_data
  api_logs:
    name: syn137_api_logs
  minio_data:
    name: syn137_minio_data
  redis_data:
    name: syn137_redis_data
networks:
  syn-internal:
    name: syn137_internal
    driver: bridge
  syn-proxy:
    name: syn137_proxy
    driver: bridge
    internal: true
  agent-net: null
