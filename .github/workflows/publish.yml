# npm Publish — manual-only workflow for publishing to npm.
#
# Requires workflow_dispatch (human must click "Run workflow" in GitHub UI).
# This is intentional for supply chain security — see SECURITY.md.
#
# Uses npm Trusted Publishing (OIDC) — no npm token needed.
# The npm registry exchanges the GitHub OIDC token for a short-lived
# publish credential. No secrets to store, rotate, or leak.
#
# Prerequisites:
#   - Configure Trusted Publisher on npmjs.com for @syntropic137/setup:
#     repo: syntropic137/syntropic137-npx
#     workflow: publish.yml
#     environment: npm-publish
#   - Requires npm >= 11.5.1 and Node >= 22.14.0 for OIDC token exchange
#
# IMPORTANT: Do NOT set NODE_AUTH_TOKEN — it overrides OIDC and breaks
# trusted publishing. The OIDC token is obtained automatically.

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # Must match Trusted Publisher config on npmjs.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # NOTE: Do NOT set registry-url here — it creates an .npmrc with
          # ${NODE_AUTH_TOKEN} which interferes with OIDC token exchange.

      # Ensure npm is new enough for Trusted Publishing OIDC
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"

      - name: Install dev dependencies
        run: npm ci

      - name: Type check (strict)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish with provenance
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance

      - name: Dry run complete
        if: ${{ inputs.dry_run }}
        run: echo "Dry run — skipped npm publish."
