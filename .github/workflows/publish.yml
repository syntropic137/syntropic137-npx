# npm Publish — manual-only workflow for publishing to npm.
#
# Requires workflow_dispatch (human must click "Run workflow" in GitHub UI).
# This is intentional for supply chain security — see SECURITY.md.
#
# Uses npm Trusted Publishing (OIDC) — no npm token needed.
# The npm registry exchanges the GitHub OIDC token for a short-lived
# publish credential. No secrets to store, rotate, or leak.
#
# Prerequisites:
#   - Configure Trusted Publisher on npmjs.com for @syntropic137/setup:
#     repo: syntropic137/syntropic137-npx
#     workflow: publish.yml
#     environment: npm-publish
#   - Requires npm >= 11.5.1 and Node >= 22.14.0 for OIDC token exchange
#
# IMPORTANT: Do NOT set NODE_AUTH_TOKEN — it overrides OIDC and breaks
# trusted publishing. The OIDC token is obtained automatically.

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # Must match Trusted Publisher config on npmjs.com
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          # NOTE: Do NOT set registry-url here — it creates an .npmrc with
          # ${NODE_AUTH_TOKEN} which interferes with OIDC token exchange.

      # Pin npm to a specific version for reproducibility and supply chain safety.
      # Trusted Publishing OIDC requires npm >= 11.5.1.
      - name: Install pinned npm
        run: |
          npm install -g npm@11.7.0
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"

      - name: Install dev dependencies
        run: npm ci

      - name: Type check (strict)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check if version already published
        if: ${{ !inputs.dry_run }}
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PACKAGE_VERSION="@syntropic137/setup@$VERSION"
          NPM_VIEW_OUTPUT=$(npm view "$PACKAGE_VERSION" version 2>&1)
          NPM_VIEW_STATUS=$?

          if [ "$NPM_VIEW_STATUS" -eq 0 ]; then
            printf '%s\n' "$NPM_VIEW_OUTPUT"
            echo "⚠️ Version $VERSION already published to npm — skipping"
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$NPM_VIEW_OUTPUT" | grep -q 'E404'; then
            printf '%s\n' "$NPM_VIEW_OUTPUT"
            echo "✅ Version $VERSION not yet on npm — will publish"
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$NPM_VIEW_OUTPUT" >&2
            echo "❌ Failed to check whether $PACKAGE_VERSION is already published" >&2
            exit "$NPM_VIEW_STATUS"
          fi

      - name: Publish with provenance
        if: ${{ !inputs.dry_run && steps.check.outputs.already_published == 'false' }}
        run: npm publish --access public --provenance

      - name: Already published
        if: ${{ !inputs.dry_run && steps.check.outputs.already_published == 'true' }}
        run: echo "Version ${{ steps.check.outputs.version }} already on npm — nothing to do."

      - name: Dry run complete
        if: ${{ inputs.dry_run }}
        run: echo "Dry run — skipped npm publish."
