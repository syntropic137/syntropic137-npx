# npm Publish — manual-only workflow for publishing to npm.
#
# Requires workflow_dispatch (human must click "Run workflow" in GitHub UI).
# This is intentional for supply chain security — see SECURITY.md.
#
# Uses npm Trusted Publishing (OIDC) — no npm token stored in GitHub secrets.
# The npm registry verifies this workflow's identity via GitHub's OIDC provider.
#
# Prerequisites:
#   - Configure Trusted Publisher on npmjs.com for @syntropic137/setup:
#     repo: syntropic137/syntropic137-npx
#     workflow: publish.yml
#     environment: npm-publish

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishing (OIDC provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # Requires environment approval if configured
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install dev dependencies
        run: npm ci

      - name: Type check (strict)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish with provenance
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance

      - name: Dry run complete
        if: ${{ inputs.dry_run }}
        run: echo "Dry run — skipped npm publish."
