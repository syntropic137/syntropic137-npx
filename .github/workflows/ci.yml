# CI — runs on every PR and push to main.
#
# Checks:
#   1. TypeScript strict type check
#   2. All tests pass
#   3. Build succeeds
#   4. Zero runtime dependencies (supply chain security)
#   5. Version consistency (version >= platformVersion, digest pins)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dev dependencies
        run: npm ci

      - name: Type check (strict)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  zero-deps:
    runs-on: ubuntu-latest
    name: Zero runtime dependencies
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no runtime dependencies
        run: |
          # Extract the dependencies field from package.json
          deps=$(node -e "
            const pkg = require('./package.json');
            const deps = Object.keys(pkg.dependencies || {});
            if (deps.length > 0) {
              console.error('FAIL: Found runtime dependencies:', deps.join(', '));
              console.error('This package must have zero runtime dependencies (stdlib only).');
              console.error('See SECURITY.md for rationale.');
              process.exit(1);
            }
            console.log('OK: Zero runtime dependencies');
          ")
          echo "$deps"

  consistency:
    runs-on: ubuntu-latest
    name: Version consistency
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version >= platformVersion
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PLATFORM=$(node -p "require('./package.json').syntropic137?.platformVersion || ''")

          if [ -z "$PLATFORM" ]; then
            echo "⚠️ No platformVersion set — skipping version comparison"
            exit 0
          fi

          echo "npm version:      $VERSION"
          echo "platform version: $PLATFORM"

          # Compare using node semver logic
          node -e "
            const v = '$VERSION'.split('.').map(Number);
            const p = '$PLATFORM'.split('.').map(Number);
            if (v[0] < p[0] || (v[0] === p[0] && v[1] < p[1]) || (v[0] === p[0] && v[1] === p[1] && v[2] < p[2])) {
              console.error('FAIL: version (' + '$VERSION' + ') < platformVersion (' + '$PLATFORM' + ')');
              process.exit(1);
            }
            console.log('OK: version >= platformVersion');
          "

      - name: Check digest pins in compose file
        run: |
          COMPOSE="templates/docker-compose.syntropic137.yaml"
          if [ ! -f "$COMPOSE" ]; then
            echo "⚠️ No compose file found — skipping digest check"
            exit 0
          fi

          # Check for floating tags on ghcr.io images
          if grep -E 'image:\s+ghcr\.io/.*:(latest|\$\{|v[0-9])' "$COMPOSE"; then
            echo "::error::Compose file contains floating image tags — must use @sha256: digest pins"
            exit 1
          fi

          echo "OK: All GHCR images use digest pins"

      - name: Verify image digests exist in registry
        run: |
          COMPOSE="templates/docker-compose.syntropic137.yaml"
          if [ ! -f "$COMPOSE" ]; then
            exit 0
          fi

          # Extract all ghcr.io image references with digest pins
          IMAGES=$(grep -oP 'ghcr\.io/[^\s]+@sha256:[a-f0-9]+' "$COMPOSE" || true)
          if [ -z "$IMAGES" ]; then
            echo "No digest-pinned GHCR images found — skipping registry check"
            exit 0
          fi

          FAILED=0

          # Use process substitution to avoid subshell (so FAILED propagates)
          while read -r IMAGE; do
            REPO="${IMAGE%%@*}"
            DIGEST="${IMAGE##*@}"
            # Strip ghcr.io/ prefix for the API path
            API_PATH="${REPO#ghcr.io/}"

            # GHCR requires an auth token even for public images
            TOKEN=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:${API_PATH}:pull" | \
              node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).token)")

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://ghcr.io/v2/${API_PATH}/manifests/${DIGEST}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" \
              -H "Authorization: Bearer ${TOKEN}")

            if [ "$STATUS" = "200" ]; then
              echo "OK: ${API_PATH}@${DIGEST}"
            else
              echo "::error::Digest not found in registry: ${IMAGE} (HTTP ${STATUS})"
              FAILED=1
            fi
          done <<< "$IMAGES"

          if [ "$FAILED" = "1" ]; then
            exit 1
          fi
